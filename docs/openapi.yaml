openapi: 3.0.3
info:
  title: CloudHub Storage Gateway API
  description: |
    CloudHub is a self-hosted cloud storage gateway that aggregates multiple 
    cloud storage providers into a single virtual storage pool.
    
    ## Features
    - Multi-provider support (Google Drive, Mega, OneDrive, Dropbox, R2, S3, B2, WebDAV)
    - Virtual filesystem with folder support
    - File upload, download, rename, delete, search
    - Transfer logging with retry mechanism
    - Rate limiting per user
    - Health check and capacity refresh workers
    
  version: 1.0.0
  contact:
    name: CloudHub Support
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Providers
    description: Storage provider management
  - name: Storage Accounts
    description: Storage account management
  - name: Files
    description: File operations
  - name: Transfer Logs
    description: Transfer history
  - name: Usage
    description: Usage statistics

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /providers:
    get:
      tags: [Providers]
      summary: List all providers with stats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProviderWithStats'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /providers/{id}:
    get:
      tags: [Providers]
      summary: Get provider by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Provider details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderWithStats'
        '404':
          $ref: '#/components/responses/NotFound'

  /storage-accounts:
    get:
      tags: [Storage Accounts]
      summary: List user's storage accounts
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of storage accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorageAccount'
    post:
      tags: [Storage Accounts]
      summary: Create a new storage account
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStorageAccountRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageAccount'
        '400':
          $ref: '#/components/responses/BadRequest'

  /storage-accounts/{accountID}:
    put:
      tags: [Storage Accounts]
      summary: Update a storage account
      security:
        - bearerAuth: []
      parameters:
        - name: accountID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStorageAccountRequest'
      responses:
        '200':
          description: Account updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageAccount'
    delete:
      tags: [Storage Accounts]
      summary: Delete a storage account
      security:
        - bearerAuth: []
      parameters:
        - name: accountID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Account deleted

  /storage-pool:
    get:
      tags: [Storage Accounts]
      summary: Get aggregated storage pool
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Storage pool stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoragePool'

  /files/upload:
    post:
      tags: [Files]
      summary: Upload a file
      security:
        - bearerAuth: []
      parameters:
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
          description: Parent folder ID
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /files:
    get:
      tags: [Files]
      summary: List files in a directory
      security:
        - bearerAuth: []
      parameters:
        - name: parent_id
          in: query
          schema:
            type: string
            format: uuid
          description: Parent folder ID (omit for root)
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileResponse'

  /files/folder:
    post:
      tags: [Files]
      summary: Create a folder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
      responses:
        '201':
          description: Folder created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /files/search:
    get:
      tags: [Files]
      summary: Search files by name
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search query
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileResponse'

  /files/{fileID}:
    get:
      tags: [Files]
      summary: Get file metadata
      security:
        - bearerAuth: []
      parameters:
        - name: fileID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Files]
      summary: Delete a file
      security:
        - bearerAuth: []
      parameters:
        - name: fileID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: File deleted

  /files/{fileID}/download:
    get:
      tags: [Files]
      summary: Download a file
      security:
        - bearerAuth: []
      parameters:
        - name: fileID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'

  /files/{fileID}/rename:
    put:
      tags: [Files]
      summary: Rename a file
      security:
        - bearerAuth: []
      parameters:
        - name: fileID
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameRequest'
      responses:
        '200':
          description: File renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'

  /transfer-logs:
    get:
      tags: [Transfer Logs]
      summary: Get transfer logs
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Transfer logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferLogListResponse'

  /usage:
    get:
      tags: [Usage]
      summary: Get usage statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usage statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStatsResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        user:
          $ref: '#/components/schemas/UserProfile'

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
        created_at:
          type: string
          format: date-time

    ProviderWithStats:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
        display_name:
          type: string
        icon_url:
          type: string
        account_count:
          type: integer
        total_capacity:
          type: integer
        total_used:
          type: integer
        total_free:
          type: integer
        usage_percent:
          type: number

    StorageAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        provider_id:
          type: string
          format: uuid
        label:
          type: string
        rclone_remote_name:
          type: string
        capacity_bytes:
          type: integer
        used_bytes:
          type: integer
        health_status:
          type: string
          enum: [healthy, unhealthy, unknown]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    CreateStorageAccountRequest:
      type: object
      required: [provider_id, label, credentials]
      properties:
        provider_id:
          type: string
          format: uuid
        label:
          type: string
        credentials:
          type: object
        capacity_bytes:
          type: integer
        cost_per_gb_month:
          type: number

    UpdateStorageAccountRequest:
      type: object
      properties:
        label:
          type: string
        credentials:
          type: object
        capacity_bytes:
          type: integer
        is_active:
          type: boolean

    StoragePool:
      type: object
      properties:
        total_capacity:
          type: integer
        total_used:
          type: integer
        total_free:
          type: integer
        usage_percent:
          type: number
        account_count:
          type: integer

    FileResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        virtual_path:
          type: string
        size:
          type: integer
        checksum:
          type: string
        mime_type:
          type: string
        is_directory:
          type: boolean
        parent_id:
          type: string
          format: uuid
          nullable: true
        location_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateFolderRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        parent_id:
          type: string
          format: uuid

    RenameRequest:
      type: object
      required: [new_name]
      properties:
        new_name:
          type: string

    TransferLogListResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: '#/components/schemas/TransferLog'
        total:
          type: integer

    TransferLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        file_id:
          type: string
          format: uuid
          nullable: true
        user_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
          nullable: true
        operation:
          type: string
          enum: [upload, download, delete, move]
        status:
          type: string
          enum: [in_progress, completed, failed, retrying]
        bytes_transferred:
          type: integer
        error_message:
          type: string
          nullable: true
        retry_count:
          type: integer
        max_retries:
          type: integer
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    UsageStatsResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/ProviderUsageStats'
        summary:
          $ref: '#/components/schemas/UsageSummary'

    ProviderUsageStats:
      type: object
      properties:
        provider_id:
          type: string
          format: uuid
        provider_name:
          type: string
        provider_type:
          type: string
        account_count:
          type: integer
        total_capacity:
          type: integer
        total_used:
          type: integer
        total_free:
          type: integer
        usage_percent:
          type: number
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountUsageStats'

    AccountUsageStats:
      type: object
      properties:
        account_id:
          type: string
          format: uuid
        label:
          type: string
        remote_name:
          type: string
        health_status:
          type: string
        capacity:
          type: integer
        used:
          type: integer
        free:
          type: integer
        usage_percent:
          type: number
        cost_per_gb_month:
          type: number

    UsageSummary:
      type: object
      properties:
        total_providers:
          type: integer
        total_accounts:
          type: integer
        total_capacity:
          type: integer
        total_used:
          type: integer
        total_free:
          type: integer
        overall_usage_percent:
          type: number
        healthy_accounts:
          type: integer
        unhealthy_accounts:
          type: integer

    Error:
      type: object
      properties:
        code:
          type: integer
        status:
          type: string
        message:
          type: string
        details:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
